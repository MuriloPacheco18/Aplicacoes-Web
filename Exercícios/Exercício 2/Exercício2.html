<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Soma de 1 até 100</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}
</style>

</head>
<body>

<h1>Soma de 1 até 100</h1>

<button onclick="calcularSoma()">Calcular</button>

<script>
function calcularSoma() {
    let soma = 0;

    for (let i = 1; i <= 100; i++) {
        soma += i;
    }

    alert("Resultado: " + soma);
}
</script>

</body>
</html>
